<!DOCTYPE html>
<html>
<head>
 <meta charset="UTF-8">  
 <title>503 - Server Overloaded</title>
  <style>
    body {
      font-family: sans-serif;
      background: #0a1628;
      color: white;
      text-align: center;
      padding: 80px 20px;
    }
    h1 { color: #e74c3c; font-size: 3rem; margin-bottom: 20px; }
    p  { color: #94a3b8; font-size: 1.2rem; margin: 10px 0; }
    .badge {
      display: inline-block;
      background: #e74c3c;
      color: white;
      padding: 8px 20px;
      border-radius: 20px;
      font-weight: bold;
      margin-top: 20px;
    }
  </style>
</head>
<body>
  <h1>⚠ 503</h1>
  <p>Server is currently overloaded.</p>
  <p>Too many requests — DDoS attack in progress.</p>
  <div class="badge">Service Unavailable</div>
</body>
</html>
