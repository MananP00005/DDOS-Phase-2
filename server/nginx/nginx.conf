worker_processes 1;
worker_rlimit_nofile 1024;

events {
    worker_connections 512;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;
    sendfile      on;
    keepalive_timeout 65;

    log_format detailed
        '$remote_addr [$time_iso8601] "$request" '
        '$status $body_bytes_sent "$http_user_agent" '
        '$request_time';

    log_format honeypot_fmt
        '$remote_addr [$time_iso8601] "$request" '
        '$status $body_bytes_sent "$http_user_agent" '
        '$request_time [HONEYPOT]';

    access_log /var/log/nginx/access.log detailed;
    error_log  /var/log/nginx/error.log warn;

    limit_req_zone  $binary_remote_addr zone=req_zone:10m rate=500r/s;
    limit_conn_zone $binary_remote_addr zone=conn_zone:10m;

    geo $sinkhole {
        default 0;
        include /etc/nginx/sinkholes.conf;
    }

    upstream flask_app {
        server flask:5000 max_fails=3 fail_timeout=10s;
        keepalive 32;
    }

    upstream sinkhole_app {
        server sinkhole:5000 max_fails=3 fail_timeout=10s;
        keepalive 32;
    }

    server {
        listen 80;
        server_name _;

        server_tokens off;
        add_header Server        "Apache/2.4.41 (Ubuntu)" always;
        add_header X-Powered-By  "PHP/7.4.3"              always;

        include /etc/nginx/blocked_ips.conf;

        limit_req  zone=req_zone burst=1000 nodelay;
        limit_conn conn_zone 100;
        limit_req_status  503;
        limit_conn_status 503;

        location ~ ^/(admin|wp-admin|phpmyadmin|wp-login\.php|\.env|\.git) {
            access_log /var/log/nginx/access.log    detailed;
            access_log /var/log/nginx/honeypot.log  honeypot_fmt;
            add_header Content-Type "text/html; charset=utf-8" always;
            return 200 '<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><title>Admin Login</title><style>*{margin:0;padding:0;box-sizing:border-box;}body{font-family:Arial,sans-serif;background:#f1f1f1;display:flex;justify-content:center;align-items:center;height:100vh;}.box{background:#fff;padding:40px;border-radius:4px;box-shadow:0 2px 8px rgba(0,0,0,.15);width:320px;}h2{text-align:center;color:#333;margin-bottom:24px;}label{display:block;font-size:13px;color:#555;margin-bottom:4px;}input{width:100%;padding:9px;border:1px solid #ddd;border-radius:3px;box-sizing:border-box;margin-bottom:16px;font-size:14px;}button{width:100%;padding:10px;background:#0073aa;color:#fff;border:none;border-radius:3px;font-size:14px;cursor:pointer;}</style></head><body><div class="box"><h2>Admin Panel</h2><form method="POST"><label>Username</label><input type="text" name="log" autocomplete="off"><label>Password</label><input type="password" name="pwd"><button type="submit">Log In</button></form></div></body></html>';
        }

        location = /login {
            access_log /var/log/nginx/access.log    detailed;
            access_log /var/log/nginx/honeypot.log  honeypot_fmt;
            add_header Content-Type "text/html; charset=utf-8" always;
            return 200 '<!DOCTYPE html><html><head><title>Login</title></head><body><h2>University Portal Login</h2><form method="POST"><input type="text" name="uid" placeholder="Student ID"><input type="password" name="pwd" placeholder="Password"><button type="submit">Sign In</button></form></body></html>';
        }

        location / {
            if ($sinkhole = 1) {
                proxy_pass http://sinkhole_app;
                break;
            }
            proxy_pass         http://flask_app;
            proxy_http_version 1.1;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   Connection        "";
            proxy_connect_timeout  5s;
            proxy_send_timeout     10s;
            proxy_read_timeout     15s;
            proxy_intercept_errors on;
            error_page 502 504 =503 @overloaded;
        }

        location /nginx_status {
            stub_status on;
            allow 172.20.0.0/16;
            deny  all;
        }

        error_page 503 @overloaded;
        location @overloaded {
            default_type 'text/html; charset=utf-8';
            return 503 '<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><title>503 - Server Overloaded</title><style>*{margin:0;padding:0;box-sizing:border-box;}body{font-family:sans-serif;background:#0a1628;color:white;text-align:center;padding:80px 20px;min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;}.icon{font-size:72px;margin-bottom:20px;}h1{color:#e74c3c;font-size:2rem;margin-bottom:16px;}p{color:#94a3b8;margin-bottom:10px;font-size:1rem;}.badge{display:inline-block;background:#e74c3c;color:white;padding:10px 28px;border-radius:20px;font-weight:bold;margin-top:24px;font-size:1rem;}.university{margin-top:40px;color:#475569;font-size:0.85rem;}</style></head><body><div class="icon">&#9888;&#65039;</div><h1>503 &mdash; Server Overloaded</h1><p>The Westbrook University web server is currently under a DDoS attack.</p><p>All workers are busy processing attack traffic.</p><p>Please try again in a few moments.</p><div class="badge">&#10007; Service Unavailable</div><p class="university">Westbrook University &mdash; IT Security Lab &mdash; CS559</p></body></html>';
        }

        error_page 403 @blocked;
        location @blocked {
            default_type 'text/html; charset=utf-8';
            return 403 '<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><title>403 - Blocked</title><style>*{margin:0;padding:0;box-sizing:border-box;}body{font-family:sans-serif;background:#0a1628;color:white;text-align:center;padding:80px 20px;min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;}.icon{font-size:72px;margin-bottom:20px;}h1{color:#f97316;font-size:2rem;margin-bottom:16px;}p{color:#94a3b8;margin-bottom:10px;font-size:1rem;}.badge{display:inline-block;background:#f97316;color:white;padding:10px 28px;border-radius:20px;font-weight:bold;margin-top:24px;font-size:1rem;}.university{margin-top:40px;color:#475569;font-size:0.85rem;}</style></head><body><div class="icon">&#128683;</div><h1>403 &mdash; Access Blocked</h1><p>Your IP address has been blocked by the ML Defense System.</p><p>Suspicious traffic pattern detected from your address.</p><div class="badge">&#128274; IP Blocked</div><p class="university">Westbrook University &mdash; IT Security Lab &mdash; CS559</p></body></html>';
        }
    }
}
